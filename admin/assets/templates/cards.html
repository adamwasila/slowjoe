{{range .sortedConnections}}
<div class="card {{.Type}} shadow-sm border-0">
    <div class="cardcontent card-body">
        <div class="d-flex align-items-start justify-content-between gap-2 mb-2">
            <div>
                <div class="card__alias">{{.Alias}}</div>
                <div class="card__name">{{.Name}}</div>
            </div>
            <span class="badge card__type">{{.Type}}</span>
        </div>
        <div class="card__times mb-3">
            {{if .Started}}
            <div class="card__started">Opened: {{.Since}}</div>
            {{end}}
            {{if .Finished}}
            <div class="card__finished">Closed: {{.Until}}</div>
            {{end}}
        </div>
        <div class="card__stats-bar">
            <div class="stats-bar">
                <div class="stats-bar__segment stats-bar__upstream" style="width: {{.UpstreamPercent}}%" title="{{.BytesSentUpstreamFormatted}} sent upstream">
                    <span class="stats-bar__label">{{.BytesSentUpstreamFormatted}}</span>
                </div>
                <div class="stats-bar__segment stats-bar__downstream" style="width: {{.DownstreamPercent}}%" title="{{.BytesSentDownstreamFormatted}} sent downstream">
                    <span class="stats-bar__label">{{.BytesSentDownstreamFormatted}}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
