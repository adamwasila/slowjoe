{{define "BEGIN"}}
<!DOCTYPE html>
<html lang="us">

<head>
    <title>SlowJoe</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="/bootstrap-5.3.3.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/style.css">
    <script src="/htmx-1.9.12.js"></script>
    <script src="/surreal-1.1.8.js"></script>
    <script src="/pollinator-0.3.2.js"></script>
</head>

<body id="body">
    <script>
        let b = me()
        let currentViewMode = 'cards'
        let currentSortColumn = null
        let currentSortDirection = 'asc'
        
        function loadSortState() {
            // Try to load from URL first
            const urlParams = new URLSearchParams(window.location.search)
            const urlSort = urlParams.get('sort')
            const urlDir = urlParams.get('dir')
            
            if (urlSort && urlDir) {
                currentSortColumn = urlSort
                currentSortDirection = urlDir
            } else {
                // Fall back to localStorage
                const savedSort = localStorage.getItem('sortColumn')
                const savedDir = localStorage.getItem('sortDirection')
                if (savedSort && savedDir) {
                    currentSortColumn = savedSort
                    currentSortDirection = savedDir
                }
            }
        }
        
        function saveSortState() {
            localStorage.setItem('sortColumn', currentSortColumn)
            localStorage.setItem('sortDirection', currentSortDirection)
            
            // Update URL without reloading
            const url = new URL(window.location)
            if (currentSortColumn) {
                url.searchParams.set('sort', currentSortColumn)
                url.searchParams.set('dir', currentSortDirection)
            } else {
                url.searchParams.delete('sort')
                url.searchParams.delete('dir')
            }
            window.history.replaceState({}, '', url)
        }
        
        function startPolling(delay) {
            const { Status, Event } = Pollinator
            if (typeof poller != 'undefined') {
                poller.stop()
            }
            if (delay > 0) {
                poller = new Pollinator(function () {
                }, { delay: delay })
                poller.on(Event.POLL, function (val) {
                    htmx.trigger('body', 'poll')
                })
                poller.start()
            }
        }
        
        function switchViewMode(mode) {
            currentViewMode = mode
            updateMainCardsUrl()
            const mainCards = document.getElementById('main-cards')
            if (mainCards) {
                htmx.trigger(mainCards, 'poll')
            }
        }
        
        function applySorting() {
            if (!currentSortColumn || currentViewMode !== 'table') return
            
            const table = document.querySelector('#main-cards table tbody')
            if (!table) return
            
            const rows = Array.from(table.querySelectorAll('tr'))
            if (rows.length === 0) return
            
            rows.sort((a, b) => {
                let aVal = a.getAttribute('data-' + currentSortColumn)
                let bVal = b.getAttribute('data-' + currentSortColumn)
                
                // Convert to numbers if possible
                const aNum = parseFloat(aVal)
                const bNum = parseFloat(bVal)
                if (!isNaN(aNum) && !isNaN(bNum)) {
                    return currentSortDirection === 'asc' ? aNum - bNum : bNum - aNum
                }
                
                // String comparison
                if (currentSortDirection === 'asc') {
                    return aVal.localeCompare(bVal)
                } else {
                    return bVal.localeCompare(aVal)
                }
            })
            
            table.innerHTML = ''
            rows.forEach(row => table.appendChild(row))
            
            // Update sort indicators
            document.querySelectorAll('.sort-header').forEach(header => {
                header.classList.remove('sort-asc', 'sort-desc')
            })
            const activeHeader = document.querySelector(`.sort-header[data-column="${currentSortColumn}"]`)
            if (activeHeader) {
                activeHeader.classList.add(currentSortDirection === 'asc' ? 'sort-asc' : 'sort-desc')
            }
        }
        
        function sortTable(column) {
            if (currentSortColumn === column) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc'
            } else {
                currentSortColumn = column
                currentSortDirection = 'asc'
            }
            
            saveSortState()
            updateMainCardsUrl()
            applySorting()
        }
        
        function updateMainCardsUrl() {
            const mainCards = document.getElementById('main-cards')
            if (!mainCards) return
            
            let url = currentViewMode === 'cards' ? '/admin/connections' : '/admin/connections/table'
            
            // Add sort parameters if they exist
            if (currentSortColumn) {
                url += `?sort=${currentSortColumn}&dir=${currentSortDirection}`
            }
            
            mainCards.setAttribute('hx-get', url)
            htmx.process(mainCards)
        }
        
        // Load sort state on page load
        onloadAdd(() => {
            loadSortState()
            updateMainCardsUrl()
            applySorting()
        })
        
        // Reapply sorting after HTMX content swap
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'main-cards') {
                setTimeout(() => applySorting(), 10)
            }
        })
    </script>
    <div class="app-shell">
        <aside class="sidenav">
            <div class="sidenav__brand">
                <img class="sidenav__img" src="/logo.png"></img>
                <h1 class="sidenav__title mb-0">Slow Joe</h1>
            </div>
            <ul class="sidenav__list nav nav-pills flex-column gap-2">
                {{range .ui.Menu}}
                <li class="sidenav__list-item{{if .Enabled}} sidenav__list-item-selected{{end}}"><a
                        href="/admin/{{.Name}}" class="nav-link">{{.Label}}</a></li>
                {{end}}
            </ul>
        </aside>
        <div class="workspace">
            <header class="header navbar navbar-expand border-bottom">
                <div class="container-fluid px-0">
                    <div class="d-flex align-items-center gap-2">
                        <a class="navbar-brand fw-semibold mb-0"
                            href="https://github.com/adamwasila/slowjoe">Dashboard</a>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label for="viewMode" class="form-label text-muted small mb-0">View</label>
                        <select id="viewMode" class="form-select form-select-sm">
                            <option value="cards" selected="selected">Cards</option>
                            <option value="table">Table</option>
                            <script>
                                let vm = me()
                                onloadAdd(() => {
                                    const saved = localStorage.getItem('viewMode') || 'cards'
                                    vm.value = saved
                                    switchViewMode(saved)
                                })
                                vm.on("change", ev => {
                                    const mode = me(ev).value
                                    localStorage.setItem('viewMode', mode)
                                    switchViewMode(mode)
                                })
                            </script>
                        </select>
                        <label for="reload" class="form-label text-muted small mb-0 ms-3">Auto refresh</label>
                        <select id="reload" class="form-select form-select-sm">
                            <option value="0">Off</option>
                            <option value="1" selected="selected">1s</option>
                            <option value="5">5s</option>
                            <option value="10">10s</option>
                            <option value="30">30s</option>
                            <option value="60">1m</option>
                            <script>
                                let s = me()
                                onloadAdd(() => {
                                    startPolling(s.value * 1000)
                                })
                                me().on("change", ev => {
                                    startPolling(me(ev).value * 1000)
                                })
                            </script>
                        </select>
                    </div>
                </div>
            </header>
            {{end}}
            {{define "END"}}
            <footer
                class="footer d-flex flex-wrap justify-content-between align-items-center gap-2 small text-muted border-top">
                <div>Created by <a href="https://github.com/adamwasila/">Adam Wasila</a>; licensed under an <a
                        href="https://www.apache.org/licenses/LICENSE-2.0">Apache License, Version 2.0</a></div>
                <div class="fw-semibold">{{.admin.Version}}</div>
            </footer>
        </div>
    </div>
    <script src="/bootstrap-5.3.3.bundle.min.js"></script>
</body>

</html>
{{end}}
