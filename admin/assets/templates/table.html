<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th class="sort-header" data-column="type" onclick="sortTable('type')" style="cursor: pointer; width: 120px;">
                    Type <span class="sort-indicator">⇅</span>
                </th>
                <th style="width: 200px;">Connection</th>
                <th class="sort-header" data-column="opened" onclick="sortTable('opened')" style="cursor: pointer; width: 150px;">
                    Opened <span class="sort-indicator">⇅</span>
                </th>
                <th class="sort-header" data-column="closed" onclick="sortTable('closed')" style="cursor: pointer; width: 150px;">
                    Closed <span class="sort-indicator">⇅</span>
                </th>
                <th class="sort-header" data-column="size" onclick="sortTable('size')" style="cursor: pointer; width: 120px;">
                    Total Size <span class="sort-indicator">⇅</span>
                </th>
                <th style="width: 120px;">Upstream</th>
                <th style="width: 120px;">Downstream</th>
            </tr>
        </thead>
        <tbody>
            {{range .sortedConnections}}
            <tr data-type="{{.Type}}" 
                data-opened="{{if .Started}}{{.Started.Unix}}{{else}}0{{end}}" 
                data-closed="{{if .Finished}}{{.Finished.Unix}}{{else}}0{{end}}"
                data-size="{{.TotalBytes}}">
                <td>
                    <span class="badge badge-{{.Type}}">{{.Type}}</span>
                </td>
                <td>
                    <div class="fw-semibold">{{.Alias}}</div>
                    <div class="text-muted small">{{.Name}}</div>
                </td>
                <td>{{.Since}}</td>
                <td>{{.Until}}</td>
                <td class="fw-semibold">{{.TotalBytesFormatted}}</td>
                <td>{{.BytesSentUpstreamFormatted}}</td>
                <td>{{.BytesSentDownstreamFormatted}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
