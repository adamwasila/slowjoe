{{template "BEGIN" .}}
<main id="main" class="main">
    <div class="main-overview row g-3 mb-3">
        <div id="connections-total" class="overviewcard col-12 col-xl-6"
          hx-get="/admin/connections/total"
          hx-trigger="poll from:body">
        </div>   
        <div id="connections-active" class="overviewcard col-12 col-xl-6"
          hx-get="/admin/connections/active"
          hx-trigger="poll from:body">
        </div>
    </div>
    <div class="main-cards" id="main-cards" 
        hx-get="/admin/connections"
        hx-trigger="poll from:body">
      </div>
</main>
{{template "END" .}}
